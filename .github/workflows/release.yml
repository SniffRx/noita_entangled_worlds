name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag. If empty, one is generated automatically."
        required: false
        type: string

  push:
    tags:
      - "v*"
    branches:
      - lastb

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mod:
    runs-on: ubuntu-22.04
    name: Build mod and ewext

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: i686-pc-windows-gnu
          components: rust-src

      - name: Install extra deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64-i686

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ewext -> target
          key: ewext-i686-windows-gnu

      - name: Build ewext
        run: cargo +nightly build --release --target=i686-pc-windows-gnu -Zbuild-std="panic_abort,std"
        working-directory: ./ewext

      - name: Copy ewext
        run: cp ewext/target/i686-pc-windows-gnu/release/ewext.dll quant.ew/ewext.dll

      - name: Create archive
        run: python scripts/ci_make_archives.py mod

      - name: Prepare workflow artifact
        run: |
          mkdir -p target/upload/quant.ew
          unzip -q target/quant.ew.zip -d target/upload/quant.ew

      - uses: actions/upload-artifact@v4
        with:
          name: quant.ew
          path: target/upload/quant.ew

  build-proxy-linux:
    name: Build proxy for linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install extra deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libasound2-dev \
            libjack-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            noita-proxy -> target
          key: proxy-linux

      - name: Build Linux proxy release
        run: cargo build --release
        working-directory: ./noita-proxy

      - name: Create archives
        run: python scripts/ci_make_archives.py linux

      - name: Prepare workflow artifact
        run: |
          mkdir -p target/upload/noita-proxy-linux
          unzip -q target/noita-proxy-linux.zip -d target/upload/noita-proxy-linux

      - uses: actions/upload-artifact@v4
        with:
          name: noita-proxy-linux
          path: target/upload/noita-proxy-linux

  build-proxy-windows:
    name: Build proxy for windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            noita-proxy -> target
          key: proxy-windows

      - name: Build Windows proxy release
        run: cargo build --release
        working-directory: ./noita-proxy

      - name: Create archives
        run: python scripts/ci_make_archives.py windows

      - name: Prepare workflow artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/upload/noita-proxy-win | Out-Null
          Expand-Archive -Path target/noita-proxy-win.zip -DestinationPath target/upload/noita-proxy-win -Force

      - uses: actions/upload-artifact@v4
        with:
          name: noita-proxy-win
          path: target/upload/noita-proxy-win

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs:
      - build-mod
      - build-proxy-linux
      - build-proxy-windows

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: last_release_notes.md

      - name: Choose release tag
        id: release-tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          else
            tag="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release archives
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED

          for name in ("quant.ew", "noita-proxy-linux", "noita-proxy-win"):
              src = Path("release-artifacts") / name
              if not src.is_dir():
                  raise SystemExit(f"Missing artifact directory: {src}")

              with ZipFile(f"{name}.zip", "w", compression=ZIP_DEFLATED, compresslevel=9) as release:
                  for path in src.rglob("*"):
                      if path.is_file():
                          release.write(path, path.relative_to(src))
          PY

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release-tag.outputs.tag }}
          commit: ${{ github.sha }}
          artifacts: "*.zip"
          bodyFile: last_release_notes.md
